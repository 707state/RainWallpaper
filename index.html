<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>雨滴玻璃效果 - ShaderToy 移植</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #1a1a2e; }
        canvas { display: block; }
        .info {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(200, 220, 255, 0.3);
            font-size: 14px;
            pointer-events: none;
            user-select: none;
            letter-spacing: 2px;
            font-family: Arial, sans-serif;
        }
    </style>
</head>
<body>
    <div class="info">💧 雨滴玻璃 · 背景图片来自网络 💧</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from "three";

        // --- 1. 场景 / 相机 / 渲染器 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a1a);

        // 正交相机确保四边形完美覆盖屏幕
        const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0.1, 10);
        camera.position.z = 1;

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // --- 2. 加载背景纹理 (用于 iChannel0) ---
        // 使用一张免费的网络图片，请确保网络畅通；若失效可替换为其他图片链接
        const textureLoader = new THREE.TextureLoader();
        // 添加 crossOrigin 以支持跨域图片
        textureLoader.load(
            'https://picsum.photos/seed/rain/1024/768',
            (texture) => {
                texture.wrapS = texture.wrapT = THREE.RepeatWrapping;
                texture.magFilter = THREE.LinearFilter;
                texture.minFilter = THREE.LinearMipmapLinearFilter;
                uniforms.iChannel0.value = texture;
                // 纹理加载完成后，可以开始渲染
            },
            undefined,
            (err) => {
                console.warn('背景图片加载失败，将使用纯色纹理代替', err);
                // 若图片加载失败，生成一个简单渐变色纹理
                const canvas = document.createElement('canvas');
                canvas.width = 512;
                canvas.height = 512;
                const ctx = canvas.getContext('2d');
                const gradient = ctx.createLinearGradient(0, 0, 512, 512);
                gradient.addColorStop(0, '#2b4162');
                gradient.addColorStop(1, '#fa9c7a');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, 512, 512);
                const fallbackTex = new THREE.CanvasTexture(canvas);
                fallbackTex.wrapS = fallbackTex.wrapT = THREE.RepeatWrapping;
                uniforms.iChannel0.value = fallbackTex;
            }
        );

        // --- 3. 定义 Shader 材质 ---
        const vertexShader = `
            varying vec2 vUv;
            void main() {
                vUv = uv;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `;

        const fragmentShader = `
            precision highp float;

            uniform float iTime;
            uniform vec2  iResolution;
            uniform sampler2D iChannel0;

            varying vec2  vUv;

            // ---- 以下为 ShaderToy 原始代码 (仅微调了 mainImage → main) ----
            #define S(a, b, t) smoothstep(a, b, t)
            //#define DEBUG
            #define size 0.2

            vec3 N13(float p) {
                vec3 p3 = fract(vec3(p) * vec3(.1031,.11369,.13787));
                p3 += dot(p3, p3.yzx + 19.19);
                return fract(vec3((p3.x + p3.y)*p3.z, (p3.x+p3.z)*p3.y, (p3.y+p3.z)*p3.x));
            }

            vec4 N14(float t) {
                return fract(sin(t*vec4(123., 1024., 1456., 264.))*vec4(6547., 345., 8799., 1564.));
            }
            float N(float t) {
                return fract(sin(t*12345.564)*7658.76);
            }

            float Saw(float b, float t) {
                return S(0., b, t)*S(1., b, t);
            }

            vec2 Drops(vec2 uv, float t) {
                vec2 UV = uv;
                uv.y += t*0.8;
                vec2 a = vec2(6., 1.);
                vec2 grid = a*2.;
                vec2 id = floor(uv*grid);
                float colShift = N(id.x); 
                uv.y += colShift;
                id = floor(uv*grid);
                vec3 n = N13(id.x*35.2+id.y*2376.1);
                vec2 st = fract(uv*grid)-vec2(.5, 0);
                float x = n.x-.5;
                float y = UV.y*20.;
                float distort = sin(y+sin(y));
                x += distort*(.5-abs(x))*(n.z-.5);
                x *= .7;
                float ti = fract(t+n.z);
                y = (Saw(.85, ti)-.5)*.9+.5;
                vec2 p = vec2(x, y);
                float d = length((st-p)*a.yx);
                float dSize = size; 
                float Drop = S(dSize, .0, d);
                float r = sqrt(S(1., y, st.y));
                float cd = abs(st.x-x);
                float trail = S((dSize*.5+.03)*r, (dSize*.5-.05)*r, cd);
                float trailFront = S(-.02, .02, st.y-y);
                trail *= trailFront;
                y = UV.y;
                y += N(id.x);
                float trail2 = S(dSize*r, .0, cd);
                float droplets = max(0., (sin(y*(1.-y)*120.)-st.y))*trail2*trailFront*n.z;
                y = fract(y*10.)+(st.y-.5);
                float dd = length(st-vec2(x, y));
                droplets = S(dSize*N(id.x), 0., dd);
                float m = Drop+droplets*r*trailFront;
                #ifdef DEBUG
                m += st.x>a.y*.45 || st.y>a.x*.165 ? 1.2 : 0.;
                #endif
                return vec2(m, trail);
            }

            float StaticDrops(vec2 uv, float t) {
                uv *= 30.;
                vec2 id = floor(uv);
                uv = fract(uv)-.5;
                vec3 n = N13(id.x*107.45+id.y*3543.654);
                vec2 p = (n.xy-.5)*0.5;
                float d = length(uv-p);
                float fade = Saw(.025, fract(t+n.z));
                float c = S(size, 0., d)*fract(n.z*10.)*fade;
                return c;
            }

            vec2 Rain(vec2 uv, float t) {
                float s = StaticDrops(uv, t); 
                vec2 r1 = Drops(uv, t);
                vec2 r2 = Drops(uv*1.8, t);
                #ifdef DEBUG
                float c = r1.x;
                #else
                float c = s+r1.x+r2.x;
                #endif
                c = S(.3, 1., c);
                #ifdef DEBUG
                return vec2(c, r1.y);
                #else
                return vec2(c, max(r1.y, r2.y));
                #endif
            }

            void main() {
                // 使用 vUv 和 iResolution 计算 fragCoord
                vec2 fragCoord = vUv * iResolution;
                vec2 uv = (fragCoord.xy - .5 * iResolution.xy) / iResolution.y;
                vec2 UV = vUv;  // 直接用 vUv 作为归一化坐标 (0~1)
                float T = iTime;

                float t = T * .2;
                float rainAmount = 0.8;

                UV = (UV - .5) * (.9) + .5;

                vec2 c = Rain(uv, t);

                vec2 e = vec2(.001, 0.);
                float cx = Rain(uv + e, t).x;
                float cy = Rain(uv + e.yx, t).x;
                vec2 n = vec2(cx - c.x, cy - c.x);

                // ---- 高斯模糊（来自 ShaderToy） ----
                float Pi = 6.28318530718;
                float Directions = 32.0;
                float Quality = 8.0;
                float Size = 32.0;
                vec2 Radius = Size / iResolution.xy;

                vec3 col = texture(iChannel0, UV).rgb;

                for (float d = 0.0; d < Pi; d += Pi / Directions) {
                    for (float i = 1.0 / Quality; i <= 1.0; i += 1.0 / Quality) {
                        #ifdef DEBUG
                        vec3 tex = texture(iChannel0, UV + c + vec2(cos(d), sin(d)) * Radius * i).rgb;
                        #else
                        vec3 tex = texture(iChannel0, UV + n + vec2(cos(d), sin(d)) * Radius * i).rgb;
                        #endif
                        col += tex;
                    }
                }

                col /= Quality * Directions - 0.0;

                vec3 tex = texture(iChannel0, UV + n).rgb;
                c.y = clamp(c.y, 0.0, 1.0);

                col -= c.y;
                col += c.y * (tex + .6);

                gl_FragColor = vec4(col, 1.0);
            }
        `;

        const uniforms = {
            iTime: { value: 0 },
            iResolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
            iChannel0: { value: null } // 将在纹理加载完成后设置
        };

        const material = new THREE.ShaderMaterial({
            uniforms: uniforms,
            vertexShader: vertexShader,
            fragmentShader: fragmentShader,
        });

        // 全屏四边形
        const geometry = new THREE.PlaneGeometry(2, 2);
        const mesh = new THREE.Mesh(geometry, material);
        scene.add(mesh);

        // --- 4. 窗口自适应 ---
        window.addEventListener("resize", () => {
            const width = window.innerWidth;
            const height = window.innerHeight;
            renderer.setSize(width, height);
            uniforms.iResolution.value.set(width, height);
        });

        // --- 5. 动画循环 ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            uniforms.iTime.value = clock.getElapsedTime();
            renderer.render(scene, camera);
        }

        animate();

        console.log("✅ 雨滴效果 Shader 已加载！");
    </script>
</body>
</html>
